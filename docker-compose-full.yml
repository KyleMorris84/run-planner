services:
  log-in-page:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src
    volumes:
      - ./LogInPage:/src
    command: dotnet watch run --no-launch-profile
    ports:
      - '7204:7204'
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=postgres;Username=postgres;Password=postgres
      - Jwt__Issuer=http://localhost:7204
      - Jwt__Audience=http://localhost:7204
      - Jwt__ExpirationInMinutes=1
      - Jwt__SecretKey=Wowza!ThisIsALongerSecretKey1234
      - Jwt__ClockSkew=15
      - RefreshToken__ExpirationInDays=1
      - RefreshToken__CleanUpFrequencyInMinutes=60
      - Cors__AllowedOrigins__0=http://localhost:3000
      - ASPNETCORE_URLS=http://+:7204
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'
    volumes: 
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
  open-elevation:
    image: openelevation/open-elevation
    ports:
      - '80:8080'
    volumes:
      - ./elevation-data:/code/data
volumes:
  db:
    driver: local