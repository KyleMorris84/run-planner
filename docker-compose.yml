services:
  db:
    image: postgres:alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'
    volumes: 
      - db:/var/lib/postgresql/data
  open-elevation:
    image: openelevation/open-elevation
    ports:
      - '80:8080'
    volumes:
      - ./elevation-data:/code/data
volumes:
  db:
    driver: local